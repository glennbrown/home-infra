---
# Configuration for all servers
- hosts: all
  become: true
  pre_tasks:
    - name: Set Timezone
      community.general.timezone:
        name: "{{ ntp_timezone }}"
      tags: ["bootstrap"]
  roles:
    - role: base
      tags: ["bootstrap"]
      when: "'proxmox' not in group_names"

# Proxmox Host Configuration
- hosts: proxmox
  become: true
  roles:
    - role: glennbrown.proxmox
    - role: glennbrown.proxmox-nag-removal

# Configuration for all linux systems
- hosts: linux
  become: true
  pre_tasks:
    - name: Remove Ubuntu motd spam
      file:
        path: "/etc/update-motd.d/{{ item }}"
        state: absent
      loop:
        - 80-livepatch
        - 95-hwe-eol
        - 50-motd-news
        - 10-help-text
        - 88-esm-announce
        - 91-contract-ua-esm-status
      when: ansible_facts.distribution == 'Ubuntu'
  roles:
    - role: apt-mirror
    - role: glennbrown.packages
      tags: ["packages"]

# Configuration for all mac's
- hosts: mac
  roles:
    - role: geerlingguy.mac.homebrew
      tags: ["homebrew"]
    - role: glennbrown.dotfiles
      tags: ["dotfiles"]
    - role: geerlingguy.mac.mas
      when: (mas_installed_apps | length > 0) or (mas_installed_app_ids | length > 0)
      tags: ["mas"]
    - role: geerlingguy.mac.dock
      vars:
        homebrew_path: "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin"
      environment:
        PATH: "{{ homebrew_path }}:{{ ansible_facts.env.PATH }}"
      tags: ["dock"]
    - role: glennbrown.macos
      when: macos_default_settings is defined and macos_default_settings | length > 0
      tags: ["defaults"]

# Docker VM
- hosts: skidblad
  become: true
  roles:
    - role: glennbrown.mounts
    - role: geerlingguy.docker
    - role: ctop

# Tailscale LXC
- hosts: rufus
  become: true
  roles:
    - role: artis3n.tailscale.machine
  tasks:
    - name: Ensure IP Forwarding is Enabled
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
      loop:
        - { name: net.ipv4.ip_forward, value: '1' }
        - { name: net.ipv6.conf.all.forwarding, value: '1' }
    - name: Allow internal traffic to be routed through tailnet
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: tailscale0
        out_interface: "{{ ansible_facts.default_ipv4.interface }}"
        jump: ACCEPT
        state: present
    - name: Allow return traffic from tailnet to be routed back
      ansible.builtin.iptables:
        chain: FORWARD
        in_interface: "{{ ansible_facts.default_ipv4.interface }}"
        out_interface: tailscale0
        jump: ACCEPT
        state: present
    - name: Create tailscale performance tuning script
      ansible.builtin.copy:
        dest: /usr/local/bin/tailscale-performance-tuning.sh
        content: |
          #!/bin/bash
          NETDEV=$(ip -o route get 8.8.8.8 | awk '{print $5}')
          ethtool -K "$NETDEV" rx-udp-gro-forwarding on rx-gro-list off
        mode: '0755'
    - name: Create systemd unit file for tailscale performance tuning
      ansible.builtin.copy:
        dest: /etc/systemd/system/tailscale-performance-tuning.service
        content: |
          [Unit]
          Description=Tailscale Performance Tuning
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/tailscale-performance-tuning.sh
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target
        mode: '0644'
    - name: Enable tailscale performance tuning service
      ansible.builtin.systemd:
        name: tailscale-performance-tuning.service
        enabled: true
        state: started
        daemon_reload: true

# Media Collection and Distribution Server (Debian)
- hosts: thor
  become: true
  pre_tasks:
    - name: Ensure appdata exists
      file:
        path: "{{ appdata_path }}"
        state: directory
        mode: 0775
        group: users
  roles:
    - role: glennbrown.mounts
    - role: geerlingguy.docker
    - role: ctop
    - role: glennbrown.tailscale

# Cloud VPS
- hosts: celtic
  become: true
  pre_tasks:
    - name: Ensure appdata exists
      file:
        path: "{{ appdata_path }}"
        state: directory
        mode: 0775
        group: users
  roles:
    - role: geerlingguy.security
    - role: glennbrown.tailscale
    - role: geerlingguy.docker
    - role: ctop
    - role: glennbrown.oracle-cloud-agent
    - role: glennbrown.firewall
    - role: glennbrown.certbot
      tags: ["certs"]
    - role: glennbrown.nginx
      tags: ["web"]
    - role: ironicbadger.docker-compose-generator
      tags: ["compose"]
